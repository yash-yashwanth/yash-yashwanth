name: generate animation

on:
  schedule:
    - cron: "0 */24 * * *" 
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: generate-snake-midnight-green
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            # Light Mode (Black background, Green Snake)
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=%2339d353&color_dots=%23000000,%230e4429,%23006d32,%2326a641,%2339d353
            # Dark Mode (Black background, Neon Green Snake)
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2339d353&color_dots=%23000000,%230e4429,%23006d32,%2326a641,%2339d353

      - name: push-to-output-branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
