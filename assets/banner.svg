<svg width="800" height="250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161B22" stroke-width="1.5"/>
    </pattern>
    
    <!-- Glowing Orbs Gradients -->
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00C2FF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#00C2FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF94" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#00FF94" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>

    <!-- Text Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="250" fill="#0D1117" rx="10"/>
  <rect width="800" height="250" fill="url(#grid)" rx="10"/>

  <!-- Orbs -->
  <circle cx="100" cy="125" r="80" fill="url(#glowCyan)"/>
  <circle cx="700" cy="125" r="80" fill="url(#glowGreen)"/>

  <!-- Corner Accents -->
  <!-- Top Left -->
  <path d="M 30 50 L 30 30 L 50 30" fill="none" stroke="#00C2FF" stroke-width="3"/>
  <!-- Top Right -->
  <path d="M 750 30 L 770 30 L 770 50" fill="none" stroke="#00C2FF" stroke-width="3"/>
  <!-- Bottom Left -->
  <path d="M 30 200 L 30 220 L 50 220" fill="none" stroke="#00FF94" stroke-width="3"/>
  <!-- Bottom Right -->
  <path d="M 750 220 L 770 220 L 770 200" fill="none" stroke="#00FF94" stroke-width="3"/>

  <!-- Text -->
  <text x="400" y="115" font-family="Arial, sans-serif" font-weight="bold" font-size="42" fill="#00FFCC" text-anchor="middle" filter="url(#glow)">Ganji Yashwanth KUmar</text>
  
  <rect x="250" y="130" width="300" height="2" fill="#161B22" />
  
  <text x="400" y="160" font-family="Consolas, monospace" font-weight="bold" font-size="14" fill="#6E7681" text-anchor="middle" letter-spacing="2">AI ENGINEER  •  FULL STACK DEV  •  DSA ENTHUSIAST</text>

  <!-- Pill backgrounds for skills like the image -->
  <rect x="230" y="180" width="60" height="20" fill="#161B22" rx="10"/>
  <rect x="300" y="180" width="80" height="20" fill="#161B22" rx="10"/>
  <rect x="390" y="180" width="80" height="20" fill="#161B22" rx="10"/>
  <rect x="480" y="180" width="80" height="20" fill="#161B22" rx="10"/>
</svg>
